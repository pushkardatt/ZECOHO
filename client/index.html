<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Page Title -->
    <title>ZECOHO - Zero Commission Hotel Booking | Book Direct & Save 25%</title>

    <!-- Primary SEO Meta Tags -->
    <meta name="description" content="ZECOHO is India's first ZERO commission hotel booking platform. Book directly with verified hotels and save 15-25% on every stay. No commission, no middleman, no hidden fees." />
    <meta name="keywords" content="zero commission hotel booking, hotel direct booking, India hotels, book hotels India, budget hotels, luxury hotels, no booking fees, hotel deals India, ZECOHO booking" />

    <!-- Open Graph Meta (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.zecoho.com/" />
    <meta property="og:title" content="ZECOHO - Zero Commission Hotel Booking" />
    <meta property="og:description" content="Book hotels directly and save 15-25%. India's first ZERO commission booking platform." />
    <meta property="og:image" content="https://www.zecoho.com/og-image.jpg" />
    <meta property="og:site_name" content="ZECOHO" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZECOHO - Zero Commission Hotel Booking" />
    <meta name="twitter:description" content="India's first ZERO commission hotel booking platform. Book directly and save 15-25%." />
    <meta name="twitter:image" content="https://www.zecoho.com/og-image.jpg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.zecoho.com/" />

    <!-- Branding - Orange background + white Z -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FF7A00'/><text x='50' y='72' font-size='70' font-weight='bold' fill='white' text-anchor='middle'>Z</text></svg>" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Mobile App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ZECOHO" />
    <meta name="theme-color" content="#FF7A00" />

    <!-- Fonts - Swiggy-inspired clean typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- JSON-LD Structured Data (SEO Boost) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ZECOHO",
      "url": "https://www.zecoho.com/",
      "description": "ZECOHO is India's first zero-commission hotel booking platform allowing users to book hotels directly and save 15-25% on each booking.",
      "sameAs": [
        "https://www.facebook.com/zecoho",
        "https://www.instagram.com/zecoho",
        "https://www.youtube.com/@zecoho"
      ],
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.zecoho.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
